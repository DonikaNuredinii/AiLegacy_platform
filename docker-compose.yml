version: "3.9"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infrastructure/postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 20

  legacy_api:
    build: ./services/legacy_api
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/legacy_db
      LEGACY_DELAY_MS: 0
    ports:
      - "8001:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()\""]
      interval: 5s
      timeout: 3s
      retries: 20

  ai_service:
    build: ./services/ai_service
    environment:
      AI_FAIL: 0
      AI_MODE: ml
    ports:
      - "8002:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()\""]
      interval: 5s
      timeout: 3s
      retries: 20

  integration_gateway:
    build: ./services/integration_gateway
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/gateway_db
      JWT_SECRET: secretkey
      LEGACY_BASE: http://legacy_api:8000
      AI_BASE: http://ai_service:8000
    ports:
      - "8000:8000"
    depends_on:
      legacy_api:
        condition: service_healthy
      ai_service:
        condition: service_healthy

volumes:
  pgdata: